<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 2025 Dashboard</title>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>
    <header>
        <h1>F1 2025 Dashboard</h1>
    </header>
    <nav>
        <a href="#standings-section">Drivers</a>
        <a href="#constructors-section">Constructors</a>
        <a href="#lastrace-section">Last Race</a>
        <a href="#schedule-section">Schedule</a>
    </nav>
<main>
    <div id="main-loader" class="loader">Loading Engine...</div>

    <section id="standings-section" class="section active">
        <h2>Driver Standings</h2>
        <table id="standings-table">
            <thead>
                <tr>
                    <th>Pos</th>
                    <th>Driver</th>
                    <th>Team</th>
                    <th>Points</th>
                </tr>
            </thead>
            <tbody id="standings-body"></tbody>
        </table>
    </section>

    <section id="constructors-section" class="section">
        <h2>Constructor Standings</h2>
        <table id="constructors-table">
            <thead>
                <tr>
                    <th>Pos</th>
                    <th>Constructor</th>
                    <th>Nationality</th>
                    <th>Points</th>
                </tr>
            </thead>
            <tbody id="constructors-body"></tbody>
        </table>
    </section>

    <section id="lastrace-section" class="section">
        <h2 id="lastrace-title">Last Race Results</h2>
        <table id="lastrace-table">
            <thead>
                <tr>
                    <th>Pos</th>
                    <th>Driver</th>
                    <th>Team</th>
                    <th>Time / Status</th>
                </tr>
            </thead>
            <tbody id="lastrace-body"></tbody>
        </table>
    </section>

    <section id="schedule-section" class="section">
        <h2>Race Schedule 2025</h2>
        <div id="schedule-list"></div>
    </section>
</main>
<script src="../static/script.js"></script>

</footer>
</body>
</html>
